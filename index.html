<!DOCTYPE html>
<html>
<head>
    <title>MNIST Digit Recognizer (Mobile Camera)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 10px;
        }
        video {
            border: 2px solid #333;
            border-radius: 8px;
        }
        #predictBtn {
            background-color: #4CAF50;
            color: white;
            font-size: 1.5em;
            padding: 15px 30px;
            margin: 20px auto;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: block;
        }
        #predictBtn:hover {
            background-color: #45a049;
        }
        #result, #status {
            font-size: 1.3em;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h2>Capture a handwritten digit</h2>
    <video id="video" width="280" height="280" autoplay></video>
    <button id="predictBtn">Predict</button>
    <h3 id="status">Loading model...</h3>
    <h3 id="result"></h3>

    <!-- ONNX Runtime Web -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <script>
        const video = document.getElementById("video");
        const resultEl = document.getElementById("result");
        const statusEl = document.getElementById("status");
        let session;

        // -------------------------------
        // Load ONNX model
        // -------------------------------
        ort.InferenceSession.create("cnn_model_quant.onnx").then(s => {
            session = s;
            statusEl.innerText = "Model loaded. Ready to predict!";
        }).catch(err => {
            statusEl.innerText = "Failed to load model!";
            console.error("ONNX model load error:", err);
        });

        // -------------------------------
        // Open back camera with fallback
        // -------------------------------
        async function openCamera() {
            const constraints = { video: { facingMode: { ideal: "environment" } } };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
            } catch (err) {
                console.warn("Back camera not available, using default camera.", err);
                try {
                    const fallback = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = fallback;
                } catch (err2) {
                    console.error("No camera available.", err2);
                    statusEl.innerText = "No camera available!";
                }
            }
        }
        openCamera();

        // -------------------------------
        // Preprocessing function (inline)
        // Converts video frame -> [1,28,28,1] tensor
        // -------------------------------
        function preprocessImage(video, invert = true) {
            const canvas = document.createElement("canvas");
            canvas.width = 28;
            canvas.height = 28;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, 28, 28);
            const imgData = ctx.getImageData(0,0,28,28);
            const input = new Float32Array(28*28);

            for (let i=0; i<28*28; i++) {
                const r = imgData.data[i*4];
                const g = imgData.data[i*4+1];
                const b = imgData.data[i*4+2];
                const gray = 0.299*r + 0.587*g + 0.114*b;
                input[i] = invert ? 1.0 - (gray/255.0) : gray/255.0;
            }
            return new ort.Tensor('float32', input, [1,28,28,1]);
        }

        // -------------------------------
        // Predict button click
        // -------------------------------
        document.getElementById("predictBtn").addEventListener("click", async () => {
            if (!session) { alert("Model not loaded yet!"); return; }

            const tensor = preprocessImage(video, true);

            try {
                const output = await session.run({input: tensor});
                const preds = output[Object.keys(output)[0]].data;
                const predLabel = preds.indexOf(Math.max(...preds));
                resultEl.innerText = "Predicted digit: " + predLabel;
            } catch (err) {
                console.error("Inference error:", err);
                resultEl.innerText = "Prediction failed!";
            }
        });
    </script>
</body>
</html>
