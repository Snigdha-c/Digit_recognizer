<!DOCTYPE html>
<html>
<head>
    <title>MNIST Digit Recognizer (Canvas)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 10px; }
        canvas { border: 2px solid #333; border-radius: 8px; touch-action: none; }
        button {
            background-color: #4CAF50; color: white; font-size: 1.3em;
            padding: 12px 25px; margin: 10px; border: none; border-radius: 10px; cursor: pointer;
        }
        button:hover { background-color: #45a049; }
        #result, #status { font-size: 1.3em; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>Draw a digit (0–9)</h2>
    <canvas id="drawCanvas" width="280" height="280"></canvas>
    <br>
    <button id="predictBtn">Predict</button>
    <button id="clearBtn">Clear</button>
    <h3 id="status">Loading model...</h3>
    <h3 id="result"></h3>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script>
        const canvas = document.getElementById("drawCanvas");
        const ctx = canvas.getContext("2d");
        const predictBtn = document.getElementById("predictBtn");
        const clearBtn = document.getElementById("clearBtn");
        const resultEl = document.getElementById("result");
        const statusEl = document.getElementById("status");

        // --- Canvas setup ---
        ctx.fillStyle = "black";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 15;
        ctx.lineCap = "round";

        let drawing = false;

        canvas.addEventListener("mousedown", e => { drawing = true; ctx.beginPath(); });
        canvas.addEventListener("mouseup", e => { drawing = false; });
        canvas.addEventListener("mouseout", e => { drawing = false; });
        canvas.addEventListener("mousemove", e => { if(drawing) draw(e.offsetX,e.offsetY); });

        canvas.addEventListener("touchstart", e => { e.preventDefault(); drawing=true; const rect=canvas.getBoundingClientRect(); ctx.beginPath(); draw(e.touches[0].clientX-rect.left, e.touches[0].clientY-rect.top); });
        canvas.addEventListener("touchmove", e => { e.preventDefault(); if(drawing){ const rect=canvas.getBoundingClientRect(); draw(e.touches[0].clientX-rect.left, e.touches[0].clientY-rect.top); } });
        canvas.addEventListener("touchend", e => { drawing=false; });

        function draw(x,y){
            ctx.lineTo(x,y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x,y);
        }

        clearBtn.addEventListener("click", () => {
            ctx.fillRect(0,0,canvas.width,canvas.height);
            resultEl.innerText = "";
        });

        // --- Load ONNX model ---
        let session;
        ort.InferenceSession.create("cnn_model_quant.onnx").then(s => {
            session = s;
            statusEl.innerText = "Model loaded. Draw a digit and press Predict!";
        }).catch(err => { statusEl.innerText = "Failed to load model!"; console.error(err); });

        // --- Preprocess canvas with bounding box + centering ---
        function preprocessCanvas(canvas){
            const tmpCanvas = document.createElement("canvas");
            tmpCanvas.width = 28;
            tmpCanvas.height = 28;
            const tmpCtx = tmpCanvas.getContext("2d");

            const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
            const data = imgData.data;

            // Find bounding box of the white pixels
            let minX=canvas.width, minY=canvas.height, maxX=0, maxY=0;
            for(let y=0;y<canvas.height;y++){
                for(let x=0;x<canvas.width;x++){
                    const i=(y*canvas.width + x)*4;
                    const val = data[i]; // red channel (white)
                    if(val>20){ // threshold
                        if(x<minX) minX=x;
                        if(x>maxX) maxX=x;
                        if(y<minY) minY=y;
                        if(y>maxY) maxY=y;
                    }
                }
            }

            // If nothing drawn, return blank 28x28
            if(maxX<minX || maxY<minY){
                return new ort.Tensor('float32', new Float32Array(28*28), [1,28,28,1]);
            }

            const bbWidth = maxX-minX+1;
            const bbHeight = maxY-minY+1;
            const maxDim = Math.max(bbWidth, bbHeight);

            // Create square crop canvas
            const cropCanvas = document.createElement("canvas");
            cropCanvas.width = maxDim;
            cropCanvas.height = maxDim;
            const cropCtx = cropCanvas.getContext("2d");

            // Draw the bounding box to square crop
            cropCtx.fillStyle = "black";
            cropCtx.fillRect(0,0,maxDim,maxDim);
            cropCtx.drawImage(canvas, minX, minY, bbWidth, bbHeight, 0, 0, maxDim, maxDim);

            // Scale to 28x28
            tmpCtx.drawImage(cropCanvas, 0,0,28,28);

            const resizedData = tmpCtx.getImageData(0,0,28,28).data;
            const input = new Float32Array(28*28);
            for(let i=0;i<28*28;i++){
                const val = resizedData[i*4]; // red channel
                input[i] = val/255; // normalized 0–1, white-on-black
            }

            return new ort.Tensor('float32', input, [1,28,28,1]);
        }

        // --- Predict ---
        predictBtn.addEventListener("click", async () => {
            if(!session){ alert("Model not loaded yet!"); return; }
            const tensor = preprocessCanvas(canvas);
            try{
                const output = await session.run({input: tensor});
                const preds = output[Object.keys(output)[0]].data;
                const predLabel = preds.indexOf(Math.max(...preds));
                resultEl.innerText = "Predicted digit: " + predLabel;
            }catch(err){
                console.error("Inference error:", err);
                resultEl.innerText = "Prediction failed!";
            }
        });
    </script>
</body>
</html>
